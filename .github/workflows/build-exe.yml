name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'  # Changed from 4.0 (which doesn't exist)

      - name: Add Windows platform to lockfile
        run: bundle lock --add-platform x64-mingw-ucrt

      - name: Install gems
        run: bundle install

      - name: Install OCRA gem
        run: gem install ocra  # OCRA isn't typically in Gemfile

      - name: Build EXE with OCRA
        shell: pwsh
        run: |
          ocra bin/app `
            --gemfile Gemfile `
            --no-autoload `
            --windows `
            --output ReportParser.exe `
            --icon assets/icon.ico `
            lib/app/report_template.docx `
            config.yml `
            assets/icon.ico

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReportParser-windows
          path: ReportParser.exe
          retention-days: 30